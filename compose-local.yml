name: todoless-ngx

services:
  todoless-ngx:
    image: ghcr.io/chalidnl/todoless-ngx-frontend:latest
    container_name: todoless-ngx
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
    ports:
      - target: 80
        published: 7070
        protocol: tcp
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - todoless-net

  pocketbase:
    image: ghcr.io/chalidnl/todoless-ngx-pocketbase:latest
    container_name: todoless-ngx-pocketbase
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp -r /pb_hooks_bundled/* /pb_hooks/ 2>/dev/null; exec /entrypoint.sh serve --http=0.0.0.0:8090 --dir=/pb_data --migrationsDir=/pb_migrations --hooksDir=/pb_hooks --automigrate"]
    environment:
      TZ: Europe/Amsterdam
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks
    networks:
      - todoless-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  todoless-net:
    driver: bridge
