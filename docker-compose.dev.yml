name: todoless

services:
  todoless:
    image: ghcr.io/chalidnl/todoless:dev
    container_name: todoless
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    environment:
      TZ: Europe/Amsterdam
      DEPLOY_ENV: development
    ports:
      - target: 80
        published: 7070
        protocol: tcp
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - todoless-net
    x-casaos:
      envs:
        - container: TZ
          description:
            en_US: Timezone
      ports:
        - container: "80"
          description:
            en_US: Web UI

  pocketbase:
    image: ghcr.io/chalidnl/todoless-pocketbase:dev
    container_name: todoless-pocketbase
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    entrypoint: ["/entrypoint.sh"]
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data", "--migrationsDir=/pb_migrations", "--hooksDir=/pb_hooks", "--automigrate"]
    environment:
      TZ: Europe/Amsterdam
      DEPLOY_ENV: development
      COMMIT_SHA: ${COMMIT_SHA:-dev}
    # No published ports — only accessible via nginx proxy on todoless-net
    volumes:
      - /DATA/AppData/todoless/pb_data:/pb_data
      - /DATA/AppData/todoless/pb_migrations:/pb_migrations
      - /DATA/AppData/todoless/pb_hooks:/pb_hooks
    networks:
      - todoless-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    x-casaos:
      volumes:
        - container: /pb_data
          description:
            en_US: PocketBase data — database and uploads
        - container: /pb_migrations
          description:
            en_US: PocketBase migration scripts
        - container: /pb_hooks
          description:
            en_US: PocketBase server-side hooks

  mcp:
    image: ghcr.io/chalidnl/todoless-mcp:dev
    container_name: todoless-mcp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: Europe/Amsterdam
      TODOLESS_PB_URL: http://pocketbase:8090
      TODOLESS_USER_TOKEN: ${TODOLESS_USER_TOKEN:?set TODOLESS_USER_TOKEN to a PocketBase user token}
      TODOLESS_MCP_TRANSPORT: http
      TODOLESS_MCP_READONLY: ${TODOLESS_MCP_READONLY:-true}
      TODOLESS_MCP_RATE_LIMIT: ${TODOLESS_MCP_RATE_LIMIT:-30}
      TODOLESS_MCP_HTTP_PORT: 3333
    expose:
      - "3333"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3333/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - todoless-net

networks:
  todoless-net:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: todoless
  author: self-hosted
  category: Productivity
  description:
    en_US: todoless — self-hosted multi-user task manager. Tasks, notes, calendar, brain dumps, real-time sync. Free forever.
  icon: https://cdn.jsdelivr.net/gh/ChalidNL/todoless@main/public/icons/icon-512.png
  tagline:
    en_US: Self-hosted productivity app
  title:
    en_US: todoless
  port_map: "7070"
  scheme: http
  index: /
