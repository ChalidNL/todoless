<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="20%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#10B981"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="80%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Checkbox rounded square -->
  <rect
    x="96" y="96" width="320" height="320" rx="64" ry="64"
    fill="none"
    stroke="url(#rainbow)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Checkmark -->
  <polyline
    points="160,270 230,340 360,190"
    fill="none"
    stroke="url(#rainbow)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- BETA badge — bottom-right -->
  <rect
    x="340" y="400" width="120" height="38" rx="12" ry="12"
    fill="#7C3AED" opacity="0.92"
  />
  <text
    x="400" y="427"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22" font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="1"
  >BETA</text>
</svg>
