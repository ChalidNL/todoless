services:
  todoless:
    image: ghcr.io/chalidnl/todoless-frontend:red
    container_name: todoless
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "7080:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - todoless-net

  pocketbase:
    image: ghcr.io/chalidnl/todoless-pocketbase:red
    container_name: todoless-pb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    entrypoint: ["/entrypoint.sh"]
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data", "--migrationsDir=/pb_migrations", "--hooksDir=/pb_hooks", "--automigrate"]
    environment:
      TZ: Europe/Amsterdam
      COMMIT_SHA: unknown
    volumes:
      - /DATA/AppData/todoless/pb_data:/pb_data
      - /DATA/AppData/todoless/pb_migrations:/pb_migrations
      - /DATA/AppData/todoless/pb_hooks:/pb_hooks
    networks:
      - todoless-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  todoless-net:
    driver: bridge
