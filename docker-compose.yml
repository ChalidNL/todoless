name: todoless

# ── One compose for all environments ──
# The ONLY difference between environments is the TAG + PORT.
#
#   production:  TODOLESS_TAG=latest  TODOLESS_PORT=7070  docker compose up -d
#   testers:     TODOLESS_TAG=pre     TODOLESS_PORT=7071  docker compose up -d
#   design:      TODOLESS_TAG=red     TODOLESS_PORT=7080  docker compose up -d
#   development: TODOLESS_TAG=dev     TODOLESS_PORT=7072  docker compose up -d
#
# Use -p <project> for multi-instance on the same host:
#   docker compose -p todoless-pre up -d

services:
  todoless:
    image: ${REGISTRY:-ghcr.io/chalidnl}/todoless-frontend:${TODOLESS_TAG:-latest}
    container_name: todoless-${TODOLESS_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      DEPLOY_ENV: ${DEPLOY_ENV:-production}
    ports:
      - "${TODOLESS_PORT:-7070}:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - todoless-net

  pocketbase:
    image: ${REGISTRY:-ghcr.io/chalidnl}/todoless-pocketbase:${TODOLESS_TAG:-latest}
    container_name: todoless-pb-${TODOLESS_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    entrypoint: ["/entrypoint.sh"]
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data", "--migrationsDir=/pb_migrations", "--hooksDir=/pb_hooks", "--automigrate"]
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      DEPLOY_ENV: ${DEPLOY_ENV:-production}
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
    volumes:
      - ${PB_DATA_DIR:-/DATA/AppData/todoless}/pb_data:/pb_data
      - ${PB_DATA_DIR:-/DATA/AppData/todoless}/pb_migrations:/pb_migrations
      - ${PB_DATA_DIR:-/DATA/AppData/todoless}/pb_hooks:/pb_hooks
    networks:
      - todoless-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  todoless-net:
    driver: bridge
